name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - uses: CompeyDev/setup-rokit@v0.1.2
      name: Install Rokit
      with:
        version: v1.0.0
    
    - name: Run Tests
      run: lute run tests
